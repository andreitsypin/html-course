    <form action="/test">

    <form action="/search">
      <label for="agree">Согласен?</label>
      <input type="checkbox" name="agree" id="agree" />
      <label for="all">Искать везде</label>
      <input type="radio" name="search" id="all" value="all" />
      <label for="vk">Искать на вквидео</label>
      <input type="radio" name="search" id="vk" value="vk" />
      <label for="topic">Тематика</label>
      <select name="topic" id="topic">
        <option value="1">Все</option>
        <optgroup label="Популярное">
          <option value="2">Животные</option>
          <option value="3">Разработка</option>
        </optgroup>
                <optgroup label="Популярное">
          <option value="2">Животные</option>
          <option value="3">Разработка</option>
        </optgroup>
      </select>
      <label for="vol">Громкость</label>
      <input type="range" name="volume" id="vol" min="0" max="10" step="2">
      <label for="grade">Оценка</label>
      <input type="number" name="grade" id="grade" min="1" max="5">
      <label for="komm">Комментарий</label>
      <textarea name="komm" id="komm" placeholder="Введите текст" rows="10" cols="50"></textarea>
      <button>Кнопка</button>
    </form>
